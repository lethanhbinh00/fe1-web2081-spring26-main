<div class="max-w-xl mx-auto mt-10 bg-white shadow-lg rounded-2xl p-8 border border-gray-100">
  <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">
    Form thêm Product
  </h2>

  <form [formGroup]="addForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Tên sản phẩm
      </label>
      <input
        type="text"
        formControlName="name"
        placeholder="Nhập tên sản phẩm"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
      @if (name?.invalid && name?.touched) {
        <p class="text-red-500 text-sm mt-2">Tên sản phẩm là bắt buộc</p>
      }
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Giá
      </label>
      <input
        type="number"
        formControlName="price"
        placeholder="Nhập giá sản phẩm"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
      @if (price?.invalid && price?.touched) {
        <p class="text-red-500 text-sm mt-2">Giá phải lớn hơn 0</p>
      }
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Danh mục
      </label>
      <input
        type="text"
        formControlName="category"
        placeholder="Nhập danh mục"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
      @if (category?.invalid && category?.touched) {
        <p class="text-red-500 text-sm mt-2">Danh mục là bắt buộc</p>
      }
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200"
    >
      Thêm Product
    </button>
  </form>
</div>
